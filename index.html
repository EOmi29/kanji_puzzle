<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字パズル</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>
<body>

<div id="home-screen">
    <h1 class="title">漢字パズル</h1>
    <p class="description">漢字を正しい位置において完成させよう</p>

    <div class="select-block">
        <label>漢字をえらぶ（クリックで選択）</label>
        <div id="kanji-list"></div>
    </div>

    <div class="select-block">
        <label>分割数</label>
        <button class="split-btn active" data-size="2">2×2 (4マス)</button>
        <button class="split-btn" data-size="3">3×3 (9マス)</button>
    </div>

    <div class="select-block">
        <label>問題数</label>
        <button class="count-btn active">3</button>
        <button class="count-btn">5</button>
        <button class="count-btn">10</button>
    </div>

    <button id="start-button" style="margin-top:20px; background:#FFB74D; font-weight:bold;">
        パズルをはじめる
    </button>
</div>

<div id="puzzle-screen" style="display:none">
    <h1 class="title">漢字パズル</h1>
    
    <div id="grid-container">
        <div id="grid"></div>
        <div id="correct-circle"></div>
    </div>

    <div id="parts-container">
        <div class="parts-title">ここからパーツを動かそう</div>
        <div id="parts-area"></div>
    </div>

    <div id="info-area">
        <div id="reading"></div>
        <div id="words"></div>
        <button id="next-button" style="display:none">つぎのもんだい</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
