<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字パズル</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>
<body>

<div id="home-screen">
    <h1 class="title">漢字パズル</h1>
    <p class="description">漢字をえらんで、パズルを完成させよう</p>

    <div class="select-block">
        <label>① 何年生？</label>
        <div id="grade-select">
            <button class="grade-btn" data-grade="1">1年</button>
            <button class="grade-btn" data-grade="2">2年</button>
            <button class="grade-btn" data-grade="3">3年</button>
            <button class="grade-btn" data-grade="4">4年</button>
            <button class="grade-btn" data-grade="5">5年</button>
            <button class="grade-btn" data-grade="6">6年</button>
            <button class="grade-btn" data-grade="7" style="background:#CE93D8;">中学</button>
        </div>
    </div>

    <div id="term-area" class="select-block" style="display:none;">
        <label>② 何学期？（えらぶと下にかんじが出るよ）</label>
        <div id="term-select">
            <button class="term-btn" data-term="1">1学期</button>
            <button class="term-btn" data-term="2">2学期</button>
            <button class="term-btn" data-term="3">3学期</button>
        </div>
    </div>

    <div id="row-area" class="select-block" style="display:none;">
        <label>② どの「行」？（えらぶと下にかんじが出るよ）</label>
        <div id="row-select">
            <button class="term-btn" data-term="1">あ行</button>
            <button class="term-btn" data-term="2">か行</button>
            <button class="term-btn" data-term="3">さ行</button>
            <button class="term-btn" data-term="4">た行</button>
            <button class="term-btn" data-term="5">な行</button>
            <button class="term-btn" data-term="6">は行</button>
            <button class="term-btn" data-term="7">ま行</button>
            <button class="term-btn" data-term="8">や行</button>
            <button class="term-btn" data-term="9">ら行</button>
            <button class="term-btn" data-term="10">わ行</button>
        </div>
    </div>

    <div id="kanji-container" class="select-block" style="display:none;">
        <div id="kanji-sections"></div>
        <button id="clear-all-btn" style="background:#ef5350; color:white; margin-top:20px;">リストをリセット</button>
    </div>

    <div class="select-block">
        <label>設定</label>
        <button class="split-btn active" data-size="2">4マス</button>
        <button class="split-btn" data-size="3">9マス</button>
        <span style="margin:0 10px; color:#ccc;">|</span>
        <button class="count-btn active">5</button>
        <button class="count-btn">10</button>
    </div>

    <button id="start-button" style="margin-top:20px; background:#FFB74D; font-weight:bold; display:none; padding:15px 50px; font-size:22px;">
        パズルをはじめる
    </button>
</div>

<div id="puzzle-screen" style="display:none">
    <h1 class="title">漢字パズル</h1>
    <div id="main-puzzle-layout">
        <div id="words" class="vertical-text"></div>
        <div id="grid-container">
            <div id="grid"></div>
            <div id="correct-circle"></div>
        </div>
        <div id="reading" class="vertical-text"></div>
    </div>
    <div id="parts-container">
        <div id="parts-area"></div>
    </div>
    <button id="next-button" style="display:none">つぎのもんだいへ</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
