<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字パズル</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>
<body>

<div id="home-screen">
    <h1 class="title">漢字パズル</h1>
    <p class="description">漢字を正しい位置において完成させよう</p>

    <div class="select-block">
        <label>かんじをえらぶ（クリックしてね）</label>
        <div id="kanji-list"></div>
    </div>

    <div class="select-block">
        <label>マスの数</label>
        <button class="split-btn active" data-size="2">4マス (2×2)</button>
        <button class="split-btn" data-size="3">9マス (3×3)</button>
    </div>

    <div class="select-block">
        <label>もんだい数</label>
        <button class="count-btn active">3</button>
        <button class="count-btn">5</button>
        <button class="count-btn">10</button>
    </div>

    <button id="start-button" style="margin-top:30px; background:#FFB74D; font-weight:bold; padding: 15px 40px; font-size: 20px;">
        パズルをはじめる
    </button>
</div>

<div id="puzzle-screen" style="display:none">
    <h1 class="title">漢字パズル</h1>
    
    <div id="main-puzzle-layout">
        <div id="words" class="vertical-text"></div>
        <div id="grid-container">
            <div id="grid"></div>
            <div id="correct-circle"></div>
        </div>
        <div id="reading" class="vertical-text"></div>
    </div>

    <div id="parts-container">
        <div class="parts-title">パーツをドラッグして上の枠に入れよう</div>
        <div id="parts-area"></div>
    </div>

    <button id="next-button" style="display:none">つぎのもんだいへ</button>
</div>

<script src="script.js"></script>
</body>
</html>
