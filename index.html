<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>漢字パズル</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

</head>

<body>

<!-- ホーム画面 -->

<div id="home-screen">

<h1 class="title">漢字パズル</h1>

<p class="description">
漢字を正しい位置において完成させよう
</p>

<div class="select-block">

<label>漢字をえらぶ</label>

<div id="kanji-list"></div>

</div>

<div class="select-block">

<label>分割</label>

<button class="split-btn" data-size="2">4分割</button>
<button class="split-btn" data-size="3">9分割</button>

</div>

<div class="select-block">

<label>問題数</label>

<button class="count-btn">5</button>
<button class="count-btn">10</button>
<button class="count-btn">15</button>

</div>

<button id="start-button">
問題を出す
</button>

</div>

<!-- 問題画面 -->

<div id="puzzle-screen" style="display:none">

<h1 class="title">漢字パズル</h1>

<div id="grid-container">

<div id="grid"></div>

<div id="correct-circle"></div>

</div>

<div id="parts-container">

<div class="parts-title">
ここからパーツを動かそう
</div>

<div id="parts-area"></div>

</div>

<div id="reading"></div>

<div id="words"></div>

<button id="next-button" style="display:none">
つぎのもんだい
</button>

</div>

<script src="script.js"></script>

</body>

</html>
